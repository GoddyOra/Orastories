<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orastories | Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #fcfaf7;
    }
    ::-webkit-scrollbar-thumb {
      background: #d1d1d1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #b1b1b1;
    }
    
    body {
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .dark-mode ::-webkit-scrollbar-track {
      background: #0f0f0f;
    }
  </style>
</head>
<body id="contactBody" class="bg-[#fcfaf7] text-[#1a1a1a] font-['Montserrat'] transition-colors duration-500">
  <nav class="fixed top-0 left-0 right-0 bg-white/95 dark-mode:bg-black/95 backdrop-blur z-50 border-b border-gray-200 dark-mode:border-white/10 transition-colors duration-500">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-['Playfair Display'] font-bold dark-mode:text-white transition-colors">
        Orastories
      </a>
      <div class="flex gap-8 items-center">
        <a href="index.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Home</a>
        <a href="about.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">About</a>
        <a href="books.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Books</a>
        <a href="reviews.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Reviews</a>
        <a href="blog.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Blog</a>
        <a href="contact.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Contact</a>
        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark-mode:hover:bg-gray-800 transition-colors">
          <svg id="sunIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style="display: none;">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="moonIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-20 max-w-4xl mx-auto px-6 py-16">
    <h1 class="text-5xl font-['Playfair Display'] font-bold mb-8 dark-mode:text-white">Get In Touch</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-12">
      <!-- Contact Information -->
      <div class="space-y-8">
        <div>
          <h3 class="text-lg font-bold dark-mode:text-white mb-2">Email</h3>
          <a href="mailto:hello@orastories.com" class="text-amber-700 dark-mode:text-amber-400 hover:underline">
            hello@orastories.com
          </a>
        </div>
        
        <div>
          <h3 class="text-lg font-bold dark-mode:text-white mb-2">Follow Us</h3>
          <div class="flex gap-4">
            <a href="#" class="text-amber-700 dark-mode:text-amber-400 hover:text-amber-800 dark-mode:hover:text-amber-300 transition-colors">
              Twitter
            </a>
            <a href="#" class="text-amber-700 dark-mode:text-amber-400 hover:text-amber-800 dark-mode:hover:text-amber-300 transition-colors">
              Instagram
            </a>
            <a href="#" class="text-amber-700 dark-mode:text-amber-400 hover:text-amber-800 dark-mode:hover:text-amber-300 transition-colors">
              Facebook
            </a>
          </div>
        </div>
        
        <div>
          <h3 class="text-lg font-bold dark-mode:text-white mb-2">Response Time</h3>
          <p class="text-gray-700 dark-mode:text-gray-300">
            We typically respond to inquiries within 24-48 hours during business days.
          </p>
        </div>
      </div>

      <!-- Contact Form -->
      <form id="contactForm" class="space-y-6 bg-white dark-mode:bg-gray-900 p-6 rounded border border-gray-200 dark-mode:border-white/10">
        <div>
          <label for="name" class="block text-sm font-semibold mb-2 dark-mode:text-white">Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            required 
            class="w-full px-4 py-2 border border-gray-300 dark-mode:border-white/10 rounded bg-white dark-mode:bg-gray-800 dark-mode:text-white focus:outline-none focus:ring-2 focus:ring-amber-700 dark-mode:focus:ring-amber-400"
            placeholder="Your name"
          >
        </div>

        <div>
          <label for="email" class="block text-sm font-semibold mb-2 dark-mode:text-white">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            class="w-full px-4 py-2 border border-gray-300 dark-mode:border-white/10 rounded bg-white dark-mode:bg-gray-800 dark-mode:text-white focus:outline-none focus:ring-2 focus:ring-amber-700 dark-mode:focus:ring-amber-400"
            placeholder="your@email.com"
          >
        </div>

        <div>
          <label for="subject" class="block text-sm font-semibold mb-2 dark-mode:text-white">Subject</label>
          <input 
            type="text" 
            id="subject" 
            name="subject" 
            required 
            class="w-full px-4 py-2 border border-gray-300 dark-mode:border-white/10 rounded bg-white dark-mode:bg-gray-800 dark-mode:text-white focus:outline-none focus:ring-2 focus:ring-amber-700 dark-mode:focus:ring-amber-400"
            placeholder="Message subject"
          >
        </div>

        <div>
          <label for="message" class="block text-sm font-semibold mb-2 dark-mode:text-white">Message</label>
          <textarea 
            id="message" 
            name="message" 
            required 
            rows="5"
            class="w-full px-4 py-2 border border-gray-300 dark-mode:border-white/10 rounded bg-white dark-mode:bg-gray-800 dark-mode:text-white focus:outline-none focus:ring-2 focus:ring-amber-700 dark-mode:focus:ring-amber-400 resize-none"
            placeholder="Your message..."
          ></textarea>
        </div>

        <button 
          type="submit" 
          class="w-full py-3 bg-amber-700 dark-mode:bg-amber-600 text-white rounded hover:bg-amber-800 dark-mode:hover:bg-amber-700 transition-all font-semibold"
        >
          Send Message
        </button>
      </form>
    </div>
  </main>

  <footer class="border-t border-gray-200 dark-mode:border-white/10 mt-16 py-8 text-center text-gray-600 dark-mode:text-gray-400 transition-colors duration-500">
    <p>&copy; 2026 Orastories. All rights reserved.</p>
  </footer>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const contactBody = document.getElementById('contactBody');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const contactForm = document.getElementById('contactForm');

    const isDarkMode = localStorage.getItem('darkMode') === 'true';
    if (isDarkMode) {
      contactBody.classList.add('dark-mode');
      contactBody.style.backgroundColor = '#0f0f0f';
      contactBody.style.color = '#e0e0e0';
      sunIcon.style.display = 'block';
      moonIcon.style.display = 'none';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = contactBody.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', isDark);
      
      if (isDark) {
        contactBody.style.backgroundColor = '#0f0f0f';
        contactBody.style.color = '#e0e0e0';
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      } else {
        contactBody.style.backgroundColor = '#fcfaf7';
        contactBody.style.color = '#1a1a1a';
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
    });

    contactForm.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Thank you for your message! We will get back to you soon.');
      contactForm.reset();
    });
  </script>
</body>
</html>
