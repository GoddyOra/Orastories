  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    ::-webkit-scrollbar {

    }
    ::-webkit-scrollbar-track {

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body id="homeBody" class="bg-[#fcfaf7] text-[#1a1a1a] font-['Montserrat'] transition-colors duration-500">

    <div class="max-w-6xl mx-auto px-3 sm:px-4 md:px-6 py-3 md:py-4 flex flex-wrap justify-between items-center gap-3">

      </a>

        <a href="about.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">About</a>
        <a href="books.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Books</a>

        <a href="blog.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Blog</a>
        <a href="contact.html" class="hover:text-amber-700 dark-mode:hover:text-amber-400 transition-colors">Contact</a>
      </div>

    <div id="root"></div>
  </div>

  <script>
    const homeBody = document.getElementById('homeBody');

    const isDarkMode = localStorage.getItem('darkMode') === 'true';
    if (isDarkMode) {
      homeBody.classList.add('dark-mode');
      homeBody.style.backgroundColor = '#0f0f0f';
      homeBody.style.color = '#e0e0e0';
    }
  </script>
